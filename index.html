<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Huddle landing page | Abivic9-Ops(Jaguar Group)</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <header>
        <img src="./images/logo.svg" alt="Huddle Logo">
    </header>
    <!--Main section with the image and the content-->
    <main class="main-container">
        <img src="./images/illustration-mockups.svg" alt="Illustration of dashboard mockups">
        <div class="main-content">
            <h1>Build The Community Your Fans Will Love</h1>

            <p>
                Huddle re-imagines the way we build communities. You have a voice, but so does your audience.
                Create connections with your users as you engage in genuine discussion.
            </p>

            <button>Register</button>
        </div>
    </main>
    <!--Footer section with the social icons-->
    <footer>
        <div class="social-icons">
            <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#"><i class="fa-brands fa-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
        </div>

        <!--The Group that contributed to the end result of the projec-->
        <p class="contribution-section">
            Coded by <a href="https://github.com/Abivic9-ops" target="_blank">The Top-tier Jaguar Group Members</a>.
        </p>
    </footer>
</body>

</html>
